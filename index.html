<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>English Spelling Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
    <span class="bulb"></span>
  </button>

  <div id="timer" class="timer">00:00:00:00</div>

  <div id="loadingScreen" class="loading-screen hidden" aria-hidden="true">
    <div class="loading-content">
      <div class="loading-spinner" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="loading-text">LOADING</div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="ambient.mp3" type="audio/mpeg" />
  </audio>

  <main class="container">
    <section id="loginScreen" class="screen active">
      <div class="login-panel">
        <h1 class="quiz-title">ENGLISH SPELLING QUIZ</h1>

        <div class="login-form">
          <input id="studentName" type="text" placeholder="Enter your full name" autocomplete="off" />
          <input id="studentId" type="text" placeholder="Enter your student ID" autocomplete="off" />
          <button id="startBtn" type="button" class="start-btn">START</button>
        </div>

        <div id="loginMessage" class="message"></div>
      </div>
    </section>

    <section id="quizScreen" class="screen">
      <div class="quiz-panel">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progressText">Question 1 / 1</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <h2 id="questionText" class="question-text"></h2>

        <div id="optionsContainer" class="options-container"></div>

        <div class="nav-buttons">
          <button id="prevBtn" class="nav-btn circle-btn" type="button" aria-label="Previous Question">←</button>
          <button id="nextBtn" class="nav-btn circle-btn" type="button" aria-label="Next Question">→</button>
        </div>

        <div id="quizMessage" class="message"></div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="result-panel">
        <h2 class="result-title">Quiz Completed</h2>
        <div class="result-stats">
          <p>Score: <span id="finalScore">0</span></p>
          <p>Percentage: <span id="finalPercentage">0%</span></p>
          <p>Time: <span id="finalTime">00:00:00:00</span></p>
        </div>
        <p id="funMessage" class="fun-message"></p>
      </div>
    </section>
  </main>

  <script src="script.js?v=6"></script>
</body>
</html>
